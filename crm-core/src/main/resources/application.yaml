spring:
  application:
    name: crm-core
  
  datasource:
    url: jdbc:postgresql://localhost:5432/crm_db
    username: crm_user
    password: crm_password
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  rabbitmq:
    host: localhost
    port: 5672
    username: crm_user
    password: crm_password
  
  data:
    redis:
      host: localhost
      port: 6379
      password: crm_password
  
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8080/realms/crm-realm/protocol/openid-connect/certs}
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080/realms/crm-realm}

server:
  port: 8081

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    doc-expansion: list
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

keycloak:
  auth-server-url: http://localhost:8080
  realm: crm-realm
  resource: crm-client
  credentials:
    secret: crm-client-secret

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket-name: crm-bucket

loki:
  url: http://localhost:3100

logging:
  level:
    root: INFO
    com.sao_rafael.crm_core: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}
  
  data:
    redis:
      host: ${SPRING_REDIS_HOST}
      password: ${SPRING_REDIS_PASSWORD}
  
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_AUTH_SERVER_URL}/realms/crm-realm

keycloak:
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL}

loki:
  url: http://loki:3100

minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
